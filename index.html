<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
    <title>Personal Page</title>
  </head>
  <body>
      <nav id="navbar" class="navbar navbar-dark bg-dark">
        <header>
            <h2>JDev</h2>
        </header>
      <a href="#welcome-section">About</a>
      <a href="#projects">Work</a>
      <a href="#contact">Contact</a>
    </nav>
    <main>
      <div id="welcome-section" class="bg-dark bg-gradient">
        <h1>Hola, mundo</h1>
      </div>
      <div id="projects">
        <div class="project-title"><a href=""></a></div>
      </div>
      <div id="projects" class="carousel slide" data-bs-ride="carousel">
        <div class="carousel-inner">
          <div class="carousel-item active">
            <img src="./img/etch-a-sketch.jpg" class="d-block w-90" alt="etch-a-sketch">
          </div>
          <div class="carousel-item">
            <img src="./img/restaurant-page.jpg" class="d-block w-100" alt="restaurant-page">
          </div>
          <div class="carousel-item">
            <img src="./img/tictactoe.jpg" class="d-block w-100" alt="tictactoe">
          </div>
        </div>
        <button class="carousel-control-prev" type="button" data-bs-target="#projects" data-bs-slide="prev">
          <span class="carousel-control-prev-icon" aria-hidden="true"></span>
          <span class="visually-hidden">Previous</span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#projects" data-bs-slide="next">
          <span class="carousel-control-next-icon" aria-hidden="true"></span>
          <span class="visually-hidden">Next</span>
        </button>
      </div>
      <div id="contact">
        <h1>Contact me!</h1>
      </div>
    </main>
  </body>
</html>
